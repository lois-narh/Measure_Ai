name: measure_ai
description:
  "A mobile application that leverages computer vision, depth estimation,
  and augmented reality to perform accurate, context-aware measurements using only a
  smartphone camera — delivering professional-grade measurement capability across multiple
  industries at zero hardware cost."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^4.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
